{% load querystring from django_tables2 %}
<!-- Active Filters Display -->
{% if active_filters %}
  <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
    {% for active_filter in active_filters %}
      <span class="badge rounded-pill border border-secondary-subtle bg-light text-dark px-3 py-2 fw-normal">
        <span class="fw-semibold">{{ active_filter.label }}:</span>
        <span>{{ active_filter.display_value }}</span>
        {% if active_filter.clear_url %}
          <a
            href="{{ active_filter.clear_url }}"
            class="text-dark text-decoration-none ms-2 fw-semibold"
            aria-label="Remove {{ active_filter.label }} filter"
            title="Remove filter"
          >
            <i class="bi bi-x-lg"></i>
          </a>
        {% endif %}
      </span>
    {% endfor %}

    <!-- Clear all filters button -->
    <a href="?" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-funnel"></i> Clear All Filters
    </a>
  </div>
{% endif %}
